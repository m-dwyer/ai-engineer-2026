name: Deploy main to Pages

# Publishes the production build to the root of the gh-pages branch. Branch previews live under
# gh-pages/preview/<branch>/ (see preview.yml); keep_files ensures this deploy never wipes them.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

# Share one queue with preview.yml so concurrent deploys don't race on the gh-pages branch.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish to gh-pages (root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
